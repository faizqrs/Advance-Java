spring.application.name=Rest-Location-Updator
server.servlet.context-path=/Rest-Location-Updator

# Database Connection
spring.datasource.url=jdbc:mysql://localhost:3306/locationDb
spring.datasource.username=root
spring.datasource.password=Faisal@1998
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate / JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# MySQL Dialect
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Enable all actuator endpoints
management.endpoints.web.exposure.include=*

# Show complete health details
management.endpoint.health.show-details=always

# Change actuator base path (optional)
management.endpoints.web.base-path=/actuator

# Enable specific endpoints (optional)
management.endpoint.shutdown.enabled=true

