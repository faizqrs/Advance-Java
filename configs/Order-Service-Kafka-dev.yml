spring:
  application:
    name: Order-Service-Kafka

  datasource:
    url: jdbc:mysql://localhost:3306/orderdb_dev   # changed from mysql → localhost
    username: root
    password: Faisal@1998
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.MySQL8Dialect

server:
  port: 8082

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka   # changed from eurekaservice
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true

    management:
  tracing:
    sampling:
      probability: 1.0

  zipkin:
    tracing:
      endpoint: http://localhost:9411/api/v2/spans
